        "@type": "Question",
        "name": "Comment optimiser la gestion de stocks pour un e-commerce ?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "L'optimisation des stocks e-commerce repose sur 4 leviers : (1) la prévision de la demande via des méthodes statistiques ou ML, (2) le calcul du stock de sécurité, (3) la définition du seuil de réapprovisionnement, et (4) la segmentation ABC-XYZ. Des outils comme Power BI ou Python permettent d'automatiser ces calculs et d'obtenir des alertes en temps réel."
        }
      },
      {
        "@type": "Question",
        "name": "Quels résultats concrets peut-on attendre d'une mission d'optimisation logistique ?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Les résultats typiques : −10% à −25% sur les coûts de transport (VRP), −20% à −40% sur les stocks dormants, +15% à +30% sur le taux de service client. Chez AmezianDigit : −17% de coûts logistiques sur le projet VRP 2023, −40% de saisie manuelle sur la mission ETL 2025."
        }
      },
      {
        "@type": "Question",
        "name": "Qu'est-ce que l'IRP (Inventory Routing Problem) ?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "L'Inventory Routing Problem (IRP) est un modèle d'optimisation qui intègre simultanément les décisions de gestion des stocks et de planification des tournées de livraison. Il optimise conjointement ces deux dimensions, réduisant les coûts totaux logistiques de 15% à 30%."
        }
      },
      {
        "@type": "Question",
        "name": "Comment créer un dashboard logistique sous Power BI ?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Un dashboard logistique Power BI efficace nécessite : (1) connecter vos sources (ERP, WMS, Excel), (2) modéliser les données avec tables de faits et dimensions, (3) créer les mesures DAX clés (taux de service, rotation de stock, coût par commande), et (4) concevoir des visuels interactifs. AmezianDigit propose des templates prêts à l'emploi dans sa boutique."
        }
      },
      {
        "@type": "Question",
        "name": "Quel est le prix d'une mission de conseil en supply chain freelance ?",
        "acceptedAnswer": {
          "@type": "Answer",

      }
