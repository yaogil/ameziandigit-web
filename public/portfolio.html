<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yaovi Gilbert AMEZIAN — Systèmes d'Information & Supply Chain</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet"/>
  <style>
    :root{--v:#6D28D9;--vl:#7C3AED;--vp:#EDE9FE;--y:#F59E0B;--yl:#FCD34D;--yp:#FFFBEB;--dk:#1C1027;--mid:#4B3F6B;--mu:#8B7BA8;--wh:#FFFFFF;--bg:#FAFAFA;--br:rgba(109,40,217,0.12);}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--dk);overflow-x:hidden;}
    ::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:var(--vp);}::-webkit-scrollbar-thumb{background:var(--v);}
    @keyframes fadeUp{from{opacity:0;transform:translateY(28px);}to{opacity:1;transform:translateY(0);}}
    @keyframes pulse{0%,100%{opacity:.4;transform:scale(1);}50%{opacity:1;transform:scale(1.4);}}
    @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
    .fu{animation:fadeUp .7s ease forwards;}
    .d1{animation-delay:.1s;opacity:0;}.d2{animation-delay:.28s;opacity:0;}.d3{animation-delay:.46s;opacity:0;}.d4{animation-delay:.64s;opacity:0;}
    nav{position:fixed;top:0;left:0;right:0;z-index:200;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 48px;background:rgba(250,250,250,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--br);}
    .nbrand{display:flex;align-items:center;gap:10px;text-decoration:none;}
    .ngem{width:10px;height:10px;border-radius:3px;background:linear-gradient(135deg,var(--v),var(--y));transform:rotate(45deg);}
    .nname{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;color:var(--dk);letter-spacing:.04em;}
    .nname em{font-style:normal;color:var(--v);}
    .nlinks{display:flex;gap:28px;align-items:center;}
    .nlinks a{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--mu);text-decoration:none;border-bottom:2px solid transparent;padding-bottom:2px;transition:color .2s,border-color .2s;}
    .nlinks a:hover{color:var(--v);border-bottom-color:var(--y);}
    .ncta{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;padding:8px 20px;background:linear-gradient(135deg,var(--v),var(--vl));color:var(--wh);text-decoration:none;transition:transform .2s,box-shadow .2s;}
    .ncta:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(109,40,217,.3);}
    #hero{min-height:100vh;padding-top:64px;display:grid;grid-template-columns:1fr 1fr;align-items:center;position:relative;overflow:hidden;background:var(--wh);}
    .hgrid{position:absolute;inset:0;background-image:linear-gradient(var(--br) 1px,transparent 1px),linear-gradient(90deg,var(--br) 1px,transparent 1px);background-size:56px 56px;pointer-events:none;}
    .horb1{position:absolute;top:-15%;right:-10%;width:600px;height:600px;background:radial-gradient(circle,rgba(109,40,217,.08) 0%,transparent 65%);pointer-events:none;}
    .horb2{position:absolute;bottom:10%;left:-5%;width:350px;height:350px;background:radial-gradient(circle,rgba(245,158,11,.07) 0%,transparent 70%);pointer-events:none;}
    .hleft{padding:80px 48px 80px 80px;position:relative;z-index:2;}
    .hright{position:relative;display:flex;align-items:center;justify-content:center;padding:40px;}
    .heyebrow{display:flex;align-items:center;gap:12px;margin-bottom:24px;}
    .heline{width:36px;height:2px;background:linear-gradient(90deg,var(--v),var(--y));}
    .helbl{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;color:var(--v);text-transform:uppercase;}
    .hname{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(34px,4.2vw,58px);line-height:1.05;color:var(--dk);margin-bottom:16px;}
    .hname .nv{color:var(--v);}.hname .ny{color:var(--y);}
    .hrole{font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.06em;color:var(--mu);margin-bottom:18px;display:flex;align-items:center;gap:8px;}
    .hdot{width:7px;height:7px;background:#10B981;border-radius:50%;animation:pulse 2s infinite;flex-shrink:0;}
    .hdesc{font-size:15px;line-height:1.85;color:var(--mid);margin-bottom:36px;max-width:500px;}
    .hbtns{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:48px;}
    .bv{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;padding:13px 28px;background:linear-gradient(135deg,var(--v),var(--vl));color:var(--wh);text-decoration:none;box-shadow:0 4px 20px rgba(109,40,217,.25);transition:transform .2s,box-shadow .2s;}
    .bv:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(109,40,217,.35);}
    .by{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;padding:13px 28px;background:var(--y);color:var(--dk);text-decoration:none;font-weight:600;transition:transform .2s;}
    .by:hover{transform:translateY(-2px);}
    .hstats{display:flex;gap:36px;flex-wrap:wrap;padding-top:36px;border-top:1px solid var(--br);}
    .sv{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:var(--v);}
    .sl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;color:var(--mu);margin-top:4px;}
    .pcard{background:var(--bg);border:1px solid var(--br);padding:36px;width:100%;max-width:400px;position:relative;overflow:hidden;animation:float 6s ease-in-out infinite;}
    .pcard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--v),var(--y));}
    .pcardtop{display:flex;align-items:center;gap:18px;margin-bottom:28px;}
    .pavatar{width:60px;height:60px;background:linear-gradient(135deg,var(--v),var(--y));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:var(--wh);flex-shrink:0;}
    .pname{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:var(--dk);}
    .ptitle{font-family:'DM Mono',monospace;font-size:10px;color:var(--mu);margin-top:3px;line-height:1.4;}
    .prow{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--br);}
    .prow:last-child{border-bottom:none;}
    .prowlbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;color:var(--v);width:72px;flex-shrink:0;padding-top:2px;text-transform:uppercase;}
    .prowval{font-family:'IBM Plex Sans',sans-serif;font-size:12px;color:var(--mid);line-height:1.4;}
    .majorchip{margin-top:20px;padding:12px 16px;background:var(--vp);border:1px solid var(--br);display:flex;gap:10px;align-items:flex-start;}
    .majordot{width:7px;height:7px;background:var(--y);border-radius:50%;flex-shrink:0;margin-top:3px;}
    .majortext{font-family:'DM Mono',monospace;font-size:10px;color:var(--v);line-height:1.5;}
    .stag{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
    .stline{width:28px;height:2px;background:linear-gradient(90deg,var(--v),var(--y));}
    .stlbl{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;color:var(--v);text-transform:uppercase;}
    .stitle{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(26px,3.5vw,46px);line-height:1.1;}
    #exp{padding:120px 0;background:var(--vp);}
    .expinner{max-width:1280px;margin:0 auto;padding:0 80px;}
    .expgrid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:56px;}
    .expcard{background:var(--wh);border:1px solid var(--br);padding:36px;position:relative;overflow:hidden;transition:all .2s;}
    .expcard::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:linear-gradient(180deg,var(--v),var(--y));}
    .expcard:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(109,40,217,.1);border-color:var(--v);}
    .expcard.featured{grid-column:span 2;}
    .expcard.featured::before{width:100%;height:3px;top:0;left:0;}
    .exptag{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.15em;padding:3px 10px;border:1px solid var(--br);background:var(--vp);color:var(--v);display:inline-block;margin-bottom:16px;}
    .exptag.y{background:var(--yp);border-color:rgba(245,158,11,.3);color:#92400E;}
    .expdate{font-family:'DM Mono',monospace;font-size:10px;color:var(--y);margin-bottom:6px;font-weight:600;letter-spacing:.08em;}
    .exptitle{font-family:'Syne',sans-serif;font-weight:700;font-size:18px;color:var(--dk);margin-bottom:4px;}
    .expco{font-family:'IBM Plex Sans',sans-serif;font-size:13px;color:var(--mu);margin-bottom:18px;}
    .expbullets{display:flex;flex-direction:column;gap:10px;}
    .expbullet{display:flex;gap:10px;font-size:13px;color:var(--mid);line-height:1.6;}
    .expbullet::before{content:'--';color:var(--y);font-weight:700;flex-shrink:0;font-family:'DM Mono',monospace;}
    .impactrow{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;}
    .impactchip{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:var(--vp);border:1px solid var(--br);font-family:'DM Mono',monospace;font-size:10px;color:var(--v);font-weight:600;}
    #edu{padding:120px 0;background:var(--wh);}
    .eduinner{max-width:1280px;margin:0 auto;padding:0 80px;}
    .edugrid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:56px;}
    .educard{padding:36px;border:1px solid var(--br);background:var(--bg);position:relative;transition:all .2s;}
    .educard:hover{border-color:var(--v);transform:translateY(-3px);box-shadow:0 12px 40px rgba(109,40,217,.1);}
    .educard.top{border-color:var(--v);background:var(--vp);}
    .edubadge{display:inline-block;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.15em;padding:3px 10px;margin-bottom:16px;}
    .edubadge.major{background:var(--y);color:var(--dk);}
    .edubadge.m2{background:var(--v);color:var(--wh);}
    .edubadge.b{background:rgba(0,0,0,.04);color:var(--mu);border:1px solid var(--br);}
    .eduyear{font-family:'DM Mono',monospace;font-size:10px;color:var(--mu);margin-bottom:8px;}
    .edutitle{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;color:var(--dk);margin-bottom:6px;line-height:1.3;}
    .eduschool{font-size:13px;color:var(--mu);}
    .edunote{margin-top:14px;padding:10px 12px;background:var(--wh);border-left:3px solid var(--y);font-family:'DM Mono',monospace;font-size:10px;color:var(--mid);}
    #projects{padding:120px 0;background:var(--dk);}
    .projinner{max-width:1280px;margin:0 auto;padding:0 80px;}
    .projfeat{display:grid;grid-template-columns:1fr 1fr;border:1px solid rgba(255,255,255,.08);margin-bottom:20px;overflow:hidden;}
    .pfleft{padding:52px;border-right:1px solid rgba(255,255,255,.08);}
    .pfright{padding:52px;background:rgba(255,255,255,.03);}
    .ptag{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.15em;padding:4px 10px;border:1px solid rgba(109,40,217,.4);background:rgba(109,40,217,.1);color:#A78BFA;display:inline-block;margin-bottom:18px;}
    .ptitle{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:var(--wh);margin-bottom:14px;line-height:1.2;}
    .pdesc{font-size:14px;line-height:1.8;color:rgba(255,255,255,.55);margin-bottom:28px;}
    .metric{margin-bottom:14px;}
    .mrow{display:flex;justify-content:space-between;margin-bottom:5px;}
    .mlbl{font-family:'DM Mono',monospace;font-size:10px;color:rgba(255,255,255,.35);letter-spacing:.06em;}
    .mval{font-family:'DM Mono',monospace;font-size:10px;font-weight:600;color:var(--y);}
    .mbarbg{height:2px;background:rgba(255,255,255,.07);}
    .mbarfill{height:100%;background:linear-gradient(90deg,var(--v),var(--y));transition:width 1.5s ease;}
    .codeblock{background:rgba(0,0,0,.5);padding:20px;margin-top:20px;font-family:'DM Mono',monospace;font-size:11px;line-height:1.8;overflow-x:auto;position:relative;border:1px solid rgba(255,255,255,.06);}
    .codeblock::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--v),var(--y));}
    .kw{color:#C084FC;}.fn{color:#FDE68A;}.cm{color:#6B7280;font-style:italic;}.n{color:#e0e0e0;}
    .sgrp{margin-bottom:20px;}
    .slbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.15em;color:rgba(255,255,255,.25);text-transform:uppercase;margin-bottom:8px;}
    .stags{display:flex;flex-wrap:wrap;gap:6px;}
    .stag2{font-family:'DM Mono',monospace;font-size:10px;padding:4px 10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.6);}
    .kbox{margin-top:20px;padding:20px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.06);}
    .kboxlbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.15em;color:rgba(255,255,255,.25);margin-bottom:14px;}
    .kgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    .kval{font-family:'Syne',sans-serif;font-weight:800;font-size:26px;color:var(--v);}
    .ksub{font-family:'DM Mono',monospace;font-size:9px;color:rgba(255,255,255,.3);margin-top:2px;}
    .othgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
    .othcard{padding:32px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02);transition:all .2s;}
    .othcard:hover{border-color:var(--v);transform:translateY(-3px);}
    .ocnum{font-family:'DM Mono',monospace;font-size:11px;color:var(--y);font-weight:700;margin-bottom:14px;}
    .octitle{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;color:var(--wh);margin-bottom:10px;line-height:1.3;}
    .ocdesc{font-size:13px;color:rgba(255,255,255,.45);line-height:1.6;margin-bottom:18px;}
    #skills{padding:120px 0;background:var(--bg);}
    .skillsinner{max-width:1280px;margin:0 auto;padding:0 80px;}
    .skillsgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:56px;}
    .skillcard{background:var(--wh);border:1px solid var(--br);padding:36px 32px;transition:border-color .2s;}
    .skillcard:hover{border-color:var(--v);}
    .skillicon{width:44px;height:44px;display:flex;align-items:center;justify-content:center;margin-bottom:20px;font-size:18px;}
    .skillicon.v{background:linear-gradient(135deg,var(--v),var(--vl));}
    .skillicon.y{background:linear-gradient(135deg,var(--y),var(--yl));}
    .skillicon.dk{background:linear-gradient(135deg,#2D1F3E,var(--v));}
    .skillcardtitle{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;color:var(--dk);margin-bottom:20px;}
    .skitem{margin-bottom:14px;}
    .sktop{display:flex;justify-content:space-between;margin-bottom:5px;}
    .skname{font-family:'IBM Plex Sans',sans-serif;font-size:13px;color:var(--mid);}
    .skpct{font-family:'DM Mono',monospace;font-size:11px;color:var(--v);}
    .skbar{height:2px;background:var(--br);}
    .skfill{height:100%;background:linear-gradient(90deg,var(--v),var(--y));}
    .sktools{font-family:'DM Mono',monospace;font-size:9px;color:var(--mu);margin-top:4px;}
    .langrow{display:flex;gap:10px;flex-wrap:wrap;}
    .langchip{font-family:'DM Mono',monospace;font-size:10px;padding:5px 12px;background:var(--vp);border:1px solid var(--br);color:var(--v);}
    .langchip.y{background:var(--yp);border-color:rgba(245,158,11,.3);color:#92400E;}
    .toolsrow{display:flex;flex-wrap:wrap;gap:8px;margin-top:40px;}
    .toolchip{font-family:'DM Mono',monospace;font-size:10px;padding:5px 12px;background:var(--wh);border:1px solid var(--br);color:var(--mu);transition:all .2s;cursor:default;}
    .toolchip:hover{background:var(--vp);border-color:var(--v);color:var(--v);}
    #contact{padding:120px 0;background:var(--dk);}
    .contactinner{max-width:1280px;margin:0 auto;padding:0 80px;display:grid;grid-template-columns:1fr 1fr;gap:80px;}
    .clinkrow{display:flex;gap:16px;align-items:center;margin-bottom:18px;}
    .clinktag{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.15em;padding:5px 10px;background:var(--v);color:var(--wh);width:90px;text-align:center;flex-shrink:0;}
    .clinkval{font-family:'IBM Plex Sans',sans-serif;font-size:14px;color:rgba(255,255,255,.6);text-decoration:none;border-bottom:1px solid rgba(255,255,255,.08);padding-bottom:1px;transition:color .2s,border-color .2s;}
    .clinkval:hover{color:var(--y);border-color:var(--y);}
    .cform{display:flex;flex-direction:column;gap:16px;}
    .clabel{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.15em;color:rgba(255,255,255,.4);display:block;margin-bottom:8px;text-transform:uppercase;}
    .cinput{width:100%;padding:13px 16px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);font-family:'IBM Plex Sans',sans-serif;font-size:14px;color:var(--wh);outline:none;transition:border-color .2s;}
    .cinput:focus{border-color:var(--v);}
    .cinput::placeholder{color:rgba(255,255,255,.2);}
    .csubmit{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.12em;padding:15px 36px;background:linear-gradient(135deg,var(--v),var(--vl));color:var(--wh);border:none;cursor:pointer;align-self:flex-start;box-shadow:0 4px 16px rgba(109,40,217,.3);transition:transform .2s,box-shadow .2s;}
    .csubmit:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(109,40,217,.45);}
    footer{background:#130D1E;padding:28px 80px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;border-top:1px solid rgba(255,255,255,.05);}
    .flogo{font-family:'Syne',sans-serif;font-weight:800;font-size:14px;color:var(--wh);}
    .flogo em{font-style:normal;color:var(--y);}
    .fcopy{font-family:'DM Mono',monospace;font-size:10px;color:rgba(255,255,255,.18);}
    footer a{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;color:rgba(255,255,255,.28);text-decoration:none;}
    footer a:hover{color:var(--y);}
    @media(max-width:960px){
      #hero,.contactinner{grid-template-columns:1fr;}
      .expgrid,.edugrid,.skillsgrid,.othgrid,.projfeat{grid-template-columns:1fr;}
      .expcard.featured{grid-column:span 1;}
      nav .nlinks{display:none;}
      .hleft,.expinner,.eduinner,.projinner,.skillsinner,.contactinner,footer{padding-left:24px!important;padding-right:24px!important;}
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const Nav = () => (
  <nav>
    <a class="nbrand" href="#"><div class="ngem"></div><span class="nname">AMEZIAN<em>DIGIT</em></span></a>
    <div class="nlinks">
      <a href="#exp">Experiences</a><a href="#edu">Formations</a>
      <a href="#projects">Projets</a><a href="#skills">Competences</a>
      <a href="#contact">Contact</a>
      <a href="https://ameziandigit.com" target="_blank">Site consultant</a>
    </div>
    <a class="ncta" href="#contact">COLLABORER</a>
  </nav>
);

const Hero = () => (
  <section id="hero">
    <div class="hgrid"></div><div class="horb1"></div><div class="horb2"></div>
    <div class="hleft">
      <div class="heyebrow fu"><div class="heline"></div><span class="helbl">Major de Promotion · M2 MSI · Rabat, Maroc</span></div>
      <h1 class="hname fu d1"><span class="nv">Yaovi</span> Gilbert<br/><span class="ny">AMEZIAN</span></h1>
      <div class="hrole fu d2"><div class="hdot"></div>Ingenieur en Systemes d'Information & Supply Chain</div>
      <p class="hdesc fu d2">Major de Promotion en Management Industriel et Logistique. Je concois des <strong>Systemes d'Information Decisionnels</strong> pour renforcer la resilience des supply chains complexes — via le Data Engineering, la modelisation mathematique et l'optimisation combinatoire.</p>
      <div class="hbtns fu d3">
        <a class="bv" href="#exp">Voir mon parcours</a>
        <a class="by" href="#contact">Me contacter</a>
      </div>
      <div class="hstats fu d4">
        {[{v:"Major",l:"Promotion Lic. + M2"},{v:"-17%",l:"Couts logistiques VRP"},{v:"-40%",l:"Saisie manuelle ETL"},{v:"M2 MSI",l:"En cours 2024-2026"}].map((s,i)=>(
          <div key={i}><div class="sv">{s.v}</div><div class="sl">{s.l}</div></div>
        ))}
      </div>
    </div>
    <div class="hright fu d2">
      <div class="pcard">
