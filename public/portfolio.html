<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yaovi Gilbert AMEZIAN — Data Supply Chain & Optimisation</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --v: #6D28D9; --vl: #7C3AED; --vp: #EDE9FE;
      --y: #F59E0B; --yl: #FCD34D; --yp: #FFFBEB;
      --dk: #1C1027; --mid: #4B3F6B; --mu: #8B7BA8;
      --wh: #FFFFFF; --bg: #FAFAFA;
      --br: rgba(109,40,217,0.12);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--dk); overflow-x: hidden; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--vp); }
    ::-webkit-scrollbar-thumb { background: var(--v); }

    @keyframes fadeUp { from { opacity:0; transform:translateY(32px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-10px); } }
    @keyframes pulse { 0%,100% { opacity:0.4; transform:scale(1); } 50% { opacity:1; transform:scale(1.3); } }
    @keyframes scanline { from { transform:translateX(-100%); } to { transform:translateX(200%); } }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes spin { to { transform:rotate(360deg); } }

    .fu { animation: fadeUp 0.7s ease forwards; }
    .fi { animation: fadeIn 0.5s ease forwards; }
    .d1 { animation-delay:.1s; opacity:0; }
    .d2 { animation-delay:.25s; opacity:0; }
    .d3 { animation-delay:.42s; opacity:0; }
    .d4 { animation-delay:.6s; opacity:0; }

    /* ── NAV ── */
    #nav {
      position:fixed; top:0; left:0; right:0; z-index:200;
      height:64px; display:flex; align-items:center; justify-content:space-between;
      padding:0 48px;
      background:rgba(250,250,250,0.94);
      backdrop-filter:blur(16px);
      border-bottom:1px solid var(--br);
      transition:all .3s;
    }
    .nav-brand { display:flex; align-items:center; gap:10px; text-decoration:none; }
    .nav-gem {
      width:10px; height:10px; border-radius:3px;
      background:linear-gradient(135deg,var(--v),var(--y));
      transform:rotate(45deg);
    }
    .nav-name { font-family:'Syne',sans-serif; font-weight:800; font-size:15px; color:var(--dk); letter-spacing:.04em; }
    .nav-name em { font-style:normal; color:var(--v); }
    .nav-links { display:flex; gap:36px; align-items:center; }
    .nav-links a {
      font-family:'DM Mono',monospace; font-size:11px; letter-spacing:.12em;
      text-transform:uppercase; color:var(--mu); text-decoration:none;
      border-bottom:2px solid transparent; padding-bottom:2px;
      transition:color .2s, border-color .2s;
    }
    .nav-links a:hover { color:var(--v); border-bottom-color:var(--y); }
    .nav-cta {
      font-family:'DM Mono',monospace; font-size:11px; letter-spacing:.1em;
      padding:8px 20px; background:linear-gradient(135deg,var(--v),var(--vl));
      color:var(--wh); text-decoration:none; border:none; cursor:pointer;
      transition:transform .2s, box-shadow .2s;
    }
    .nav-cta:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(109,40,217,.3); }

    /* ── HERO ── */
    #hero {
      min-height:100vh; padding-top:64px;
      display:grid; grid-template-columns:1fr 1fr;
      align-items:center; gap:0;
      position:relative; overflow:hidden;
    }
    .hero-left { padding:80px 48px 80px 80px; position:relative; z-index:2; }
    .hero-right { position:relative; height:100%; display:flex; align-items:center; justify-content:center; padding:40px; }

    .hero-grid-bg {
      position:absolute; inset:0;
      background-image:linear-gradient(var(--br) 1px, transparent 1px),
        linear-gradient(90deg, var(--br) 1px, transparent 1px);
      background-size:56px 56px; pointer-events:none;
    }
    .hero-orb-v {
      position:absolute; top:-15%; right:-10%;
      width:600px; height:600px;
      background:radial-gradient(circle, rgba(109,40,217,.1) 0%, transparent 65%);
      pointer-events:none;
    }
    .hero-orb-y {
      position:absolute; bottom:10%; left:-5%;
      width:350px; height:350px;
      background:radial-gradient(circle, rgba(245,158,11,.08) 0%, transparent 70%);
      pointer-events:none;
    }

    .hero-eyebrow { display:flex; align-items:center; gap:12px; margin-bottom:28px; }
    .hero-eyebrow-line { width:36px; height:2px; background:linear-gradient(90deg,var(--v),var(--y)); }
    .hero-eyebrow span { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:.2em; color:var(--v); text-transform:uppercase; }

    .hero-name {
      font-family:'Syne',sans-serif; font-weight:800;
      font-size:clamp(36px,4.5vw,60px); line-height:1.05;
      color:var(--dk); margin-bottom:24px;
    }
    .hero-name .n-first { color:var(--v); }
    .hero-name .n-last { color:var(--y); }

    .hero-role {
      font-family:'DM Mono',monospace; font-size:13px; letter-spacing:.08em;
      color:var(--mu); margin-bottom:20px; display:flex; align-items:center; gap:8px;
    }
    .hero-role::before { content:''; display:block; width:8px; height:8px; background:var(--y); border-radius:50%; animation:pulse 2s ease-in-out infinite; }

    .hero-desc { font-size:15px; line-height:1.85; color:var(--mid); margin-bottom:40px; max-width:500px; }

    .hero-btns { display:flex; gap:14px; flex-wrap:wrap; margin-bottom:56px; }
    .btn-v {
      font-family:'DM Mono',monospace; font-size:11px; letter-spacing:.1em;
      padding:13px 28px; background:linear-gradient(135deg,var(--v),var(--vl));
      color:var(--wh); text-decoration:none;
      box-shadow:0 4px 20px rgba(109,40,217,.25);
      transition:transform .2s, box-shadow .2s;
    }
    .btn-v:hover { transform:translateY(-2px); box-shadow:0 8px 32px rgba(109,40,217,.35); }
    .btn-y {
      font-family:'DM Mono',monospace; font-size:11px; letter-spacing:.1em;
      padding:13px 28px; background:var(--y);
      color:var(--dk); text-decoration:none; font-weight:600;
      box-shadow:0 4px 20px rgba(245,158,11,.2);
      transition:transform .2s;
    }
    .btn-y:hover { transform:translateY(-2px); }

    .hero-stats { display:flex; gap:40px; flex-wrap:wrap; padding-top:40px; border-top:1px solid var(--br); }
    .stat-val { font-family:'Syne',sans-serif; font-weight:800; font-size:22px; color:var(--v); }
    .stat-lbl { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:.1em; color:var(--mu); margin-top:4px; }

    /* Pipeline card */
    .pipeline-card {
      background:var(--bg); border:1px solid var(--br);
      padding:36px; width:100%; max-width:420px;
      position:relative; overflow:hidden;
      animation:float 6s ease-in-out infinite;
    }
    .pipeline-card::before {
      content:''; position:absolute; top:0; left:0; right:0; height:3px;
      background:linear-gradient(90deg,var(--v),var(--y));
    }
    .pipeline-card-title { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:.2em; color:var(--v); margin-bottom:24px; text-transform:uppercase; }
    .pipeline-step { display:flex; align-items:center; gap:14px; padding:12px 0; border-bottom:1px solid var(--br); }
    .pipeline-step:last-child { border-bottom:none; }
    .ps-num { font-family:'DM Mono',monospace; font-size:10px; color:var(--y); font-weight:700; width:18px; flex-shrink:0; }
    .ps-info { flex:1; }
    .ps-name { font-family:'Syne',sans-serif; font-weight:700; font-size:13px; color:var(--dk); }
    .ps-tech { font-family:'DM Mono',monospace; font-size:9px; color:var(--mu); margin-top:2px; }
    .ps-bar { height:2px; border-radius:1px; background:linear-gradient(90deg,var(--v),var(--y)); }

    .avail-chip {
      margin-top:20px; padding:14px 16px;
      background:var(--vp); border:1px solid var(--br);
      display:flex; gap:10px; align-items:center;
    }
    .avail-dot { width:8px; height:8px; background:#10B981; border-radius:50%; animation:pulse 2s infinite; flex-shrink:0; }
    .avail-text { font-family:'DM Mono',monospace; font-size:10px; color:var(--v); line-height:1.5; }

    /* ── SECTION BASE ── */
    .section-tag { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
    .st-line { width:28px; height:2px; background:linear-gradient(90deg,var(--v),var(--y)); }
    .st-lbl { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:.2em; color:var(--v); text-transform:uppercase; }
    .section-title { font-family:'Syne',sans-serif; font-weight:800; font-size:clamp(28px,4vw,48px); line-height:1.1; }

    /* ── ABOUT ── */
    #about { padding:120px 0; background:var(--vp); }
    .about-inner { max-width:1280px; margin:0 auto; padding:0 80px; display:grid; grid-template-columns:1fr 1fr; gap:80px; align-items:start; }
    .about-p { font-size:15px; line-height:1.85; color:var(--mid); margin-bottom:18px; }
    .badge-row { display:flex; flex-wrap:wrap; gap:8px; margin-top:28px; }
    .badge {
      font-family:'DM Mono',monospace; font-size:10px; letter-spacing:.08em;
      padding:5px 12px; background:var(--wh); border:1px solid var(--br); color:var(--v);
    }
    .badge.y { background:var(--yp); border-color:rgba(245,158,11,.3); color:#92400E; }

    /* Timeline */
    .timeline { display:flex; flex-direction:column; gap:0; }
    .tl-item { display:flex; gap:18px; padding-bottom:28px; position:relative; }
    .tl-item::before { content:''; position:absolute; left:13px; top:28px; bottom:0; width:1px; background:var(--br); }
    .tl-item:last-child::before { display:none; }
    .tl-dot {
      width:26px; height:26px; flex-shrink:0;
      background:linear-gradient(135deg,var(--v),var(--y));
      display:flex; align-items:center; justify-content:center;
      font-family:'DM Mono',monospace; font-size:8px; color:var(--wh); font-weight:700;
    }
    .tl-date { font-family:'DM Mono',monospace; font-size:9px; color:var(--y); letter-spacing:.1em; margin-bottom:4px; font-weight:600; }
    .tl-title { font-family:'Syne',sans-serif; font-weight:700; font-size:14px; color:var(--dk); margin-bottom:3px; }
    .tl-sub { font-size:12px; color:var(--mu); line-height:1.5; }

    /* ── PROJECTS ── */
    #projects { padding:120px 0; background:var(--wh); }
    .proj-inner { max-width:1280px; margin:0 auto; padding:0 80px; }

    .feat-proj { display:grid; grid-template-columns:1fr 1fr; border:1px solid var(--br); margin-bottom:24px; overflow:hidden; }
    .fp-left { padding:52px; border-right:1px solid var(--br); }
    .fp-right { padding:52px; background:var(--vp); }
    .proj-tag {
      font-family:'DM Mono',monospace; font-size:9px; letter-spacing:.15em;
      padding:4px 10px; border:1px solid var(--br); background:var(--vp);
      color:var(--v); display:inline-block; margin-bottom:18px;
    }
    .proj-title { font-family:'Syne',sans-serif; font-weight:800; font-size:24px; color:var(--dk); margin-bottom:14px; line-height:1.2; }
    .proj-desc { font-size:14px; line-height:1.8; color:var(--mid); margin-bottom:28px; }

    .metric { margin-bottom:14px; }
    .metric-top { display:flex; justify-content:space-between; margin-bottom:5px; }
    .metric-lbl { font-family:'DM Mono',monospace; font-size:10px; color:var(--mu); letter-spacing:.06em; }
    .metric-val { font-family:'DM Mono',monospace; font-size:10px; font-weight:600; color:var(--v); }
    .mbar-bg { height:2px; background:var(--br); position:relative; }
    .mbar-fill { position:absolute; top:0; left:0; height:100%; background:linear-gradient(90deg,var(--v),var(--y)); transition:width 1.5s ease; }

    /* Code block */
    .codeblock {
      background:var(--dk); padding:20px; margin-top:20px;
      font-family:'DM Mono',monospace; font-size:11px; line-height:1.8;
      overflow-x:auto; position:relative;
    }
    .codeblock::before {
      content:''; position:absolute; top:0; left:0; right:0; height:2px;
      background:linear-gradient(90deg,var(--v),var(--y));
    }
    .kw { color:#C084FC; } .fn { color:#FDE68A; } .cm { color:#6B7280; font-style:italic; } .st { color:#86EFAC; } .n { color:#e0e0e0; }

    .stack-grp { margin-bottom:20px; }
    .stack-lbl { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:.15em; color:var(--mu); text-transform:uppercase; margin-bottom:8px; }
    .stack-tags { display:flex; flex-wrap:wrap; gap:6px; }
    .stack-tag { font-family:'DM Mono',monospace; font-size:10px; padding:4px 10px; background:var(--wh); border:1px solid var(--br); color:var(--dk); }

    .kpi-box { margin-top:20px; padding:20px; background:var(--wh); border:1px solid var(--br); }
    .kpi-lbl { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:.15em; color:var(--mu); margin-bottom:14px; }
    .kpi-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .kpi-val { font-family:'Syne',sans-serif; font-weight:800; font-size:26px; color:var(--v); }
    .kpi-sub { font-family:'DM Mono',monospace; font-size:9px; color:var(--mu); margin-top:2px; }

    /* Modal */
    .modal-bg {
      position:fixed; inset:0; z-index:300;
      background:rgba(28,16,39,.85); backdrop-filter:blur(8px);
      display:flex; align-items:center; justify-content:center; padding:20px;
    }
    .modal-box {
      background:var(--wh); max-width:800px; width:100%; max-height:90vh;
      overflow-y:auto; padding:52px; position:relative;
      border-top:3px solid var(--v);
    }
    .modal-close {
      position:absolute; top:20px; right:20px;
      background:none; border:none; cursor:pointer;
      font-family:'DM Mono',monospace; font-size:11px; color:var(--mu);
      letter-spacing:.1em; padding:8px 14px; border:1px solid var(--br);
    }
    .modal-close:hover { color:var(--dk); border-color:var(--v); }
    .modal-phase { margin-bottom:28px; }
    .modal-phase-title { font-family:'Syne',sans-serif; font-weight:700; font-size:16px; margin-bottom:12px; }
    .modal-phase-title.blue { color:var(--v); }
    .modal-phase-title.yellow { color:var(--y); }
    .modal-phase-title.dk { color:var(--dk); }
    .modal-result { background:var(--vp); border:1px solid var(--br); padding:20px; margin-top:8px; }
    .modal-result li { font-size:13px; color:var(--mid); line-height:1.8; display:flex; gap:8px; }
    .modal-result li::before { content:'✓'; color:var(--y); font-weight:700; flex-shrink:0; }

    /* Other projects grid */
    .other-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-top:20px; }
    .other-card {
      padding:32px; border:1px solid var(--br); background:var(--bg);
      transition:all .2s; cursor:default;
    }
    .other-card:hover { border-color:var(--v); transform:translateY(-3px); box-shadow:0 12px 40px rgba(109,40,217,.1); }
    .oc-num { font-family:'DM Mono',monospace; font-size:11px; color:var(--y); font-weight:700; margin-bottom:14px; }
    .oc-title { font-family:'Syne',sans-serif; font-weight:700; font-size:15px; color:var(--dk); margin-bottom:10px; line-height:1.3; }
    .oc-desc { font-size:13px; color:var(--mid); line-height:1.6; margin-bottom:18px; }

    /* ── SKILLS ── */
    #skills { padding:120px 0; background:var(--dk); }
    .skills-inner { max-width:1280px; margin:0 auto; padding:0 80px; }
    .skills-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; margin-top:64px; }
    .skill-card {
      background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.06);
      padding:36px 32px; transition:border-color .2s;
    }
    .skill-card:hover { border-color:var(--v); }
    .skill-icon {
      width:48px; height:48px;
      display:flex; align-items:center; justify-content:center;
      margin-bottom:24px; font-size:20px;
    }
    .skill-icon.v { background:linear-gradient(135deg,var(--v),var(--vl)); }
    .skill-icon.y { background:linear-gradient(135deg,var(--y),var(--yl)); }
    .skill-icon.dk { background:linear-gradient(135deg,#2D1F3E,var(--v)); }
    .skill-card-title { font-family:'Syne',sans-serif; font-weight:700; font-size:17px; color:var(--wh); margin-bottom:22px; }
    .sk-item { margin-bottom:16px; }
    .sk-top { display:flex; justify-content:space-between; margin-bottom:6px; }
    .sk-name { font-family:'IBM Plex Sans',sans-serif; font-size:13px; color:rgba(255,255,255,.7); }
    .sk-pct { font-family:'DM Mono',monospace; font-size:11px; color:var(--y); }
    .sk-bar { height:2px; background:rgba(255,255,255,.07); }
    .sk-fill { height:100%; background:linear-gradient(90deg,var(--v),var(--y)); }
    .sk-tools { font-family:'DM Mono',monospace; font-size:9px; color:rgba(255,255,255,.22); margin-top:4px; }
    .tools-row { display:flex; flex-wrap:wrap; gap:8px; margin-top:48px; }
    .tool-chip {
      font-family:'DM Mono',monospace; font-size:10px; padding:5px 12px;
      background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.07);
      color:rgba(255,255,255,.35); transition:all .2s; cursor:default;
    }
    .tool-chip:hover { background:var(--vp); border-color:var(--v); color:var(--v); }

    /* ── CONTACT ── */
    #contact { padding:120px 0; background:var(--bg); }
    .contact-inner { max-width:1280px; margin:0 auto; padding:0 80px; display:grid; grid-template-columns:1fr 1fr; gap:80px; }
    .c-link-row { display:flex; gap:16px; align-items:center; margin-bottom:18px; }
    .c-link-tag {
      font-family:'DM Mono',monospace; font-size:9px; letter-spacing:.15em;
      padding:5px 10px; background:var(--v); color:var(--wh);
      width:90px; text-align:center; flex-shrink:0;
    }
    .c-link-val {
      font-family:'IBM Plex Sans',sans-serif; font-size:14px;
      color:var(--v); text-decoration:none; border-bottom:1px solid var(--br); padding-bottom:1px;
      transition:color .2s, border-color .2s;
    }
    .c-link-val:hover { color:var(--y); border-color:var(--y); }
    .c-form { display:flex; flex-direction:column; gap:16px; }
    .c-label { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:.15em; color:var(--v); display:block; margin-bottom:8px; text-transform:uppercase; }
    .c-input {
      width:100%; padding:13px 16px;
      border:1px solid var(--br); background:var(--wh);
      font-family:'IBM Plex Sans',sans-serif; font-size:14px; color:var(--dk);
      outline:none; transition:border-color .2s;
      border-radius:0;
    }
    .c-input:focus { border-color:var(--v); }
    .c-submit {
      font-family:'DM Mono',monospace; font-size:11px; letter-spacing:.12em;
      padding:15px 36px; background:linear-gradient(135deg,var(--v),var(--vl));
      color:var(--wh); border:none; cursor:pointer; align-self:flex-start;
      box-shadow:0 4px 16px rgba(109,40,217,.25); transition:transform .2s, box-shadow .2s;
    }
    .c-submit:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(109,40,217,.4); }

    /* ── FOOTER ── */
    footer {
      background:var(--dk); padding:32px 80px;
      display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:16px;
      border-top:1px solid rgba(255,255,255,.04);
    }
    footer .fl { font-family:'Syne',sans-serif; font-weight:800; font-size:14px; color:var(--wh); }
    footer .fl em { font-style:normal; color:var(--y); }
    footer .fc { font-family:'DM Mono',monospace; font-size:10px; color:rgba(255,255,255,.18); }
    footer a { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:.1em; color:rgba(255,255,255,.28); text-decoration:none; }
    footer a:hover { color:var(--y); }

    @media(max-width:960px) {
      #hero, .about-inner, .contact-inner { grid-template-columns:1fr; }
      .feat-proj { grid-template-columns:1fr; }
      .fp-left { border-right:none; border-bottom:1px solid var(--br); }
      .skills-grid, .other-grid { grid-template-columns:1fr; }
      #nav .nav-links { display:none; }
      .hero-left, .about-inner, .proj-inner, .skills-inner, .contact-inner, footer { padding-left:24px; padding-right:24px; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── NAV ──────────────────────────────────────────────────────────────────────
const Nav = () => (
  <nav id="nav">
    <a class="nav-brand" href="#">
      <div class="nav-gem"></div>
      <span class="nav-name">AMEZIAN<em>DIGIT</em></span>
    </a>
    <div class="nav-links">
      <a href="#about">À propos</a>
      <a href="#projects">Projets</a>
      <a href="#skills">Compétences</a>
      <a href="#contact">Contact</a>
